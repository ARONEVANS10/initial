<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* MAIN BACKGROUND */
.jazul-404-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(-45deg, #800000, #ffb703, #111, #800000);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
    color: #fff;
    position: relative;
    overflow: hidden;
    padding: 20px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CARD */
.error-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 2;
}

/* LOGO */
.jazul-logo {
    width: 160px;
    animation: breathe 3s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,183,3,0.6));
}

@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

/* 404 TEXT */
.error-number {
    font-size: clamp(6rem, 12vw, 12rem);
    font-weight: 900;
    text-shadow: 0 0 20px #ffb703, 0 0 40px #ffb703;
    animation: float 2.5s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* BUTTON */
.home-btn {
    margin-top: 10px;
    padding: 12px 22px;
    background: #ffb703;
    color: #000;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
}

.home-btn:hover {
    transform: scale(1.05);
    background: #fff;
}

/* LINKS */
.links {
    margin-top: 10px;
}

.links a {
    color: #fff;
    margin: 5px;
    font-size: 0.9rem;
    opacity: 0.7;
    text-decoration: none;
}

.links a:hover {
    color: #ffb703;
    opacity: 1;
}

/* FLOATING ICONS */
.floating-icons i {
    position: absolute;
    font-size: 2rem;
    opacity: 0.1;
    animation: floatIcon 6s infinite ease-in-out;
}

.floating-icons i:nth-child(1) { top: 15%; left: 10%; }
.floating-icons i:nth-child(2) { top: 25%; right: 10%; }
.floating-icons i:nth-child(3) { bottom: 20%; left: 15%; }
.floating-icons i:nth-child(4) { bottom: 15%; right: 15%; }

@keyframes floatIcon {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}
</style>

</head>

<body>

<section class="jazul-404-page">

    <div class="floating-icons">
        <i class="bi bi-droplet-half"></i>
        <i class="bi bi-fuel-pump"></i>
        <i class="bi bi-box-seam"></i>
        <i class="bi bi-people-fill"></i>
    </div>

    <div class="error-card">

        <!-- LOGO -->
        <img src="assets/back.ico" class="jazul-logo" alt="logo">

        <!-- 404 -->
        <div class="error-number">404</div>

        <h2>Oops! Page Not Found</h2>

        <p>The page you are looking for does not exist or has been moved.</p>

        <a href="index.html" class="home-btn">Go Back Home</a>

        <div class="links">
            <a href="about.html">About</a>
            <a href="service.html">Services</a>
            <a href="product.html">Products</a>
            <a href="team.html">Team</a>
            <a href="contact.html">Contact</a>
        </div>

    </div>

</section>

</body>
</html>
