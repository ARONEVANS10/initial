      # 1. Siguraduhin na ang custom domain mo ay kasama sa build
      - name: Add CNAME
        run: echo "jazulempire.online" > ${{ github.workspace }}/_site/CNAME

      # 2. I-upload ang files para ma-deploy ng GitHub
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # 3. Bagong JOB para sa deployment (importante ito!)
  deploy:
    environment:
      name: github-pages
      url: https://jazulempire.online
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write      # Kailangan para makapag-upload sa Pages
      id-token: write   # Kailangan para sa authentication
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
