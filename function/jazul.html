<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazul Empire Login Portal</title>
<meta name="description" content="Jazul Empire Distributors - LPG & Fuel Distribution in Masbate">
<link rel="icon" href="assets/back.ico">


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --jazul-maroon:#800000;
  --jazul-yellow:#FFC107;
}

/* BODY */
body{
  background:linear-gradient(rgba(128,0,0,.85),rgba(0,0,0,.85)),
             url('../assets/back.png') center/cover no-repeat;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Segoe UI",sans-serif;
  color:white;
}

/* CARD */
.login-card{
  background:white;
  color:#333;
  padding:40px;
  border-radius:14px;
  width:100%;
  max-width:500px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.brand{
  font-weight:900;
  color:var(--jazul-maroon);
}

/* BUTTONS */
.btn-jazul{
  background:var(--jazul-yellow);
  color:var(--jazul-maroon);
  font-weight:700;
  border:none;
  padding:12px;
  border-radius:8px;
  transition:.3s;
}

.btn-jazul:hover{
  background:var(--jazul-maroon);
  color:var(--jazul-yellow);
}

.role-btn{
  width:100%;
  margin:10px 0;
}

/* MODAL INPUT */
.form-control{
  border-radius:8px;
}
</style>
</head>

<body>

<div class="login-card">

<h3 class="brand mb-3">Jazul Empire Portal</h3>
<p>Select Login Access</p>

<button class="btn btn-jazul role-btn"
        onclick="openEmployee()">
<i class="bi bi-person-fill"></i> Employee Login
</button>

<button class="btn btn-dark role-btn"
        onclick="openEmployer()">
<i class="bi bi-briefcase-fill"></i> Employer / Admin Login
</button>

<a href="../index.html" class="btn btn-outline-secondary mt-3">
<i class="bi bi-arrow-left"></i> Back to Website
</a>

</div>

<!-- ================= EMPLOYEE MODAL ================= -->
<div class="modal fade" id="employeeModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Employee Login</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input id="empName" class="form-control mb-3" placeholder="Employee Name">

<input id="empPass" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-jazul w-100" onclick="loginEmployee()">Login</button>

<p id="empError" class="text-danger mt-2"></p>

</div>
</div>
</div>
</div>

<!-- ================= EMPLOYER MODAL ================= -->
<div class="modal fade" id="employerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Employer / Admin Login</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input id="adminName" class="form-control mb-3" placeholder="Name">

<input id="adminPass" type="password" class="form-control mb-3" placeholder="Password">

<select id="adminRole" class="form-control mb-3">
<option value="">Select Role</option>
<option>Admin</option>
<option>Manager</option>
<option>Finance</option>
<option>Supervisor</option>
</select>

<button class="btn btn-dark w-100" onclick="loginEmployer()">Login</button>

<p id="adminError" class="text-danger mt-2"></p>

</div>
</div>
</div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* OPEN MODALS */
function openEmployee(){
 new bootstrap.Modal(document.getElementById('employeeModal')).show();
}

function openEmployer(){
 new bootstrap.Modal(document.getElementById('employerModal')).show();
}

/* DEMO ACCOUNTS */
const employees = [
 {name:"staff", pass:"1234"},
 {name:"checker", pass:"1234"}
];

const admins = [
 {name:"admin", pass:"admin123", role:"Admin"},
 {name:"manager", pass:"manager123", role:"Manager"}
];

/* EMPLOYEE LOGIN */
function loginEmployee(){
 let name=document.getElementById("empName").value;
 let pass=document.getElementById("empPass").value;

 let valid = employees.find(u=>u.name===name && u.pass===pass);

 if(valid){
   alert("✅ Welcome Employee: "+name);
   window.location.href="employee-dashboard.html";
 }else{
   document.getElementById("empError").innerText="Invalid login.";
 }
}

/* EMPLOYER LOGIN */
function loginEmployer(){
 let name=document.getElementById("adminName").value;
 let pass=document.getElementById("adminPass").value;
 let role=document.getElementById("adminRole").value;

 let valid = admins.find(u=>u.name===name && u.pass===pass && u.role===role);

 if(valid){
   alert("✅ Welcome "+role);
   window.location.href="admin-dashboard.html";
 }else{
   document.getElementById("adminError").innerText="Wrong credentials or role.";
 }
}

</script>

</body>
</html>
