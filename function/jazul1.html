<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jazul Empire Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="jazul.css">
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-dark jazul-nav">
  <div class="container">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-fuel-pump-fill"></i> Jazul Empire Portal
    </span>
  </div>
</nav>

<!-- MAIN LOGIN CHOICE -->
<section class="login-section">
  <div class="container text-center">

    <h1 class="title">Welcome to Jazul Empire System</h1>
    <p class="subtitle">Select your access type</p>

    <div class="row justify-content-center mt-5">

      <!-- EMPLOYEE -->
      <div class="col-md-4">
        <div class="choice-card" onclick="openEmployee()">
          <i class="bi bi-person-badge-fill icon"></i>
          <h4>Employee</h4>
          <p>Staff & Pump Attendants</p>
        </div>
      </div>

      <!-- EMPLOYER -->
      <div class="col-md-4">
        <div class="choice-card" onclick="openEmployer()">
          <i class="bi bi-briefcase-fill icon"></i>
          <h4>Employer / Admin</h4>
          <p>Managers & Administration</p>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- EMPLOYEE MODAL -->
<div class="login-modal" id="employeeModal">
  <div class="login-box">
    <h4>Employee Login</h4>

    <input type="text" id="empName" placeholder="Employee Name">
    <input type="password" id="empPass" placeholder="Password">

    <button onclick="employeeLogin()">Login</button>
    <span class="close" onclick="closeModal()">Close</span>
  </div>
</div>

<!-- EMPLOYER MODAL -->
<div class="login-modal" id="employerModal">
  <div class="login-box">
    <h4>Employer / Admin Login</h4>

    <select id="role">
      <option value="Admin">Admin</option>
      <option value="Employer">Employer</option>
    </select>

    <input type="text" id="bossName" placeholder="Username">
    <input type="password" id="bossPass" placeholder="Password">

    <button onclick="employerLogin()">Login</button>
    <span class="close" onclick="closeModal()">Close</span>
  </div>
</div>

<footer class="footer text-center">
  © 2026 Jazul Empire Distributors, Inc.
</footer>

<script src="jazul.js"></script>
</body>
</html>
